<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <style>
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
    .title { font-size: 30px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 600; }
    .small { font-size: 15px; }
    .board { fill: #0f5132; stroke: #111; stroke-width: 3; rx: 18; }
    .copper { fill: #86efac; opacity: 0.9; }
    .part { fill: #f8fafc; stroke: #111; stroke-width: 2; rx: 5; }
    .usb { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 5; }
    .ledr { fill: #fecaca; stroke: #991b1b; stroke-width: 2; rx: 5; }
    .ledy { fill: #fef08a; stroke: #a16207; stroke-width: 2; rx: 5; }
    .ledg { fill: #bbf7d0; stroke: #166534; stroke-width: 2; rx: 5; }
  </style>
  <text x="40" y="45" class="title">PCB 顶层布局草案（57mm x 14mm）</text>
  <rect x="80" y="120" width="1140" height="280" class="board"/>
  <text x="90" y="112" class="small">左侧为灯区，右侧为 USB-C 插座端。最终方向可按外壳反转。</text>

  <rect x="130" y="160" width="96" height="52" class="ledg"/>
  <text x="145" y="193" class="label">绿灯</text>
  <rect x="130" y="235" width="96" height="52" class="ledy"/>
  <text x="145" y="268" class="label">黄灯</text>
  <rect x="130" y="310" width="96" height="52" class="ledr"/>
  <text x="145" y="343" class="label">红灯</text>

  <rect x="300" y="160" width="90" height="38" class="part"/>
  <text x="323" y="185" class="small">R3</text>
  <rect x="300" y="235" width="90" height="38" class="part"/>
  <text x="323" y="260" class="small">R2</text>
  <rect x="300" y="310" width="90" height="38" class="part"/>
  <text x="323" y="335" class="small">R1</text>

  <rect x="515" y="180" width="190" height="150" class="part"/>
  <text x="558" y="242" class="label">CH552G</text>
  <text x="552" y="274" class="small">SOP-16</text>

  <rect x="750" y="165" width="80" height="38" class="part"/>
  <text x="766" y="190" class="small">R4</text>
  <rect x="750" y="220" width="80" height="38" class="part"/>
  <text x="766" y="245" class="small">R5</text>
  <rect x="750" y="285" width="80" height="38" class="part"/>
  <text x="766" y="310" class="small">C2</text>

  <rect x="870" y="165" width="85" height="38" class="part"/>
  <text x="885" y="190" class="small">R6</text>
  <rect x="870" y="220" width="85" height="38" class="part"/>
  <text x="885" y="245" class="small">R7</text>
  <rect x="870" y="285" width="85" height="38" class="part"/>
  <text x="885" y="310" class="small">C1</text>

  <rect x="1025" y="172" width="150" height="145" class="usb"/>
  <text x="1064" y="232" class="label">USB-C</text>
  <text x="1040" y="264" class="small">外壳开口端</text>

  <rect x="470" y="345" width="330" height="28" class="part"/>
  <text x="502" y="365" class="small">测试焊盘：5V / GND / D+ / D- / RST / 三路灯</text>

  <rect x="250" y="174" width="520" height="7" class="copper"/>
  <rect x="250" y="249" width="520" height="7" class="copper"/>
  <rect x="250" y="324" width="520" height="7" class="copper"/>
  <rect x="825" y="190" width="220" height="7" class="copper"/>
  <rect x="825" y="245" width="220" height="7" class="copper"/>
</svg>

